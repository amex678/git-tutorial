<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git デモサイト</title>
  <style>
    :root {
      --bg-1: #f4efe6;
      --bg-2: #dff3ea;
      --ink: #1b2a2f;
      --muted: #4b5d65;
      --accent: #0e8a6e;
      --accent-2: #d56f3e;
      --card: rgba(255, 255, 255, 0.78);
      --line: rgba(27, 42, 47, 0.12);
      --shadow: 0 20px 45px rgba(16, 38, 44, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(14, 138, 110, 0.25), transparent 48%),
        radial-gradient(circle at 85% 10%, rgba(213, 111, 62, 0.26), transparent 45%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.35) 0 1px, transparent 1px 2px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.35) 0 1px, transparent 1px 2px);
      background-size: 3px 3px;
    }

    main {
      width: min(880px, 100%);
      position: relative;
      z-index: 1;
      animation: rise 650ms ease-out both;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: clamp(24px, 5vw, 48px);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -45%;
      right: -20%;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 138, 110, 0.34), transparent 70%);
      z-index: -1;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(14, 138, 110, 0.3);
      background: rgba(14, 138, 110, 0.1);
      border-radius: 999px;
      padding: 6px 12px;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 6vw, 3.3rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0;
      max-width: 55ch;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.03rem;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      text-decoration: none;
      font-weight: 600;
      border-radius: 999px;
      padding: 11px 20px;
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #16a57a);
      box-shadow: 0 12px 22px rgba(14, 138, 110, 0.3);
    }

    .btn-secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .stats {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.7);
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      color: var(--accent-2);
    }

    .stat span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <main>
    <section class="card">
      <span class="tag">Git Tutorial</span>
      <h1>Hello, Git!</h1>
      <p class="lead">これは git clone / commit / push のデモ用サイトです。練習用でも見た目は妥協せず、読みやすく心地よいページを目指してデザインしています。</p>
      <div class="actions">
        <a class="btn btn-primary" href="#">チュートリアルを始める</a>
        <a class="btn btn-secondary" href="#">GitHub リポジトリを見る</a>
      </div>
      <div class="stats" aria-label="デモのポイント">
        <div class="stat">
          <strong>3 Step</strong>
          <span>clone / commit / push</span>
        </div>
        <div class="stat">
          <strong>100%</strong>
          <span>レスポンシブ対応</span>
        </div>
        <div class="stat">
          <strong>1 Page</strong>
          <span>シンプルで実践的</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
